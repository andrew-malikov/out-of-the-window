name: Publish VSIX

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*"

permissions:
  contents: write

jobs:
  package-vsix:
    runs-on: ubuntu-latest

    outputs:
      vsix_name: ${{ steps.expose.outputs.vsix_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate tag and align extension version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' does not match yyyy.mm.dd.number"
            exit 1
          fi

          PACKAGE_VERSION="$(bun -e 'const fs = require("fs"); process.stdout.write(JSON.parse(fs.readFileSync("package.json", "utf8")).version)')"
          if [[ "$PACKAGE_VERSION" != "$TAG_NAME" ]]; then
            echo "package.json version '$PACKAGE_VERSION' does not match tag '$TAG_NAME'"
            exit 1
          fi

          VERSION="${TAG_NAME%.*}-${TAG_NAME##*.}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          bun -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); pkg.version = process.env.VERSION; fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);'

      - name: Package extension
        id: package
        run: bunx @vscode/vsce package --out "window-theme-${{ github.ref_name }}.vsix"

      - name: Expose VSIX name
        id: expose
        run: echo "vsix_name=window-theme-${{ github.ref_name }}.vsix" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: vsix-package
          path: window-theme-${{ github.ref_name }}.vsix

  create-release:
    runs-on: ubuntu-latest
    needs: package-vsix

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix-package

      - name: Create GitHub release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.package-vsix.outputs.vsix_name }}
          generate_release_notes: true

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: package-vsix

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix-package

      - name: Publish extension to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bunx @vscode/vsce publish --packagePath "${{ needs.package-vsix.outputs.vsix_name }}" -p "$VSCE_PAT"
